<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp — Chat</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        background: #16213e;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid #0f3460;
        flex-shrink: 0;
      }
      .back-btn {
        background: none;
        border: none;
        color: #a0a0b0;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 8px;
        transition: background 0.2s;
      }
      .back-btn:hover { background: #0f3460; }
      .avatar {
        width: 38px; height: 38px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 16px; color: #fff;
      }
      .friend-info h2 { font-size: 16px; color: #fff; }
      .friend-info span { font-size: 12px; color: #22c55e; }
      .ws-status { margin-left: auto; font-size: 12px; color: #6b7280; }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .messages::-webkit-scrollbar { width: 4px; }
      .messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 10px; }
      .msg { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      .msg.own { flex-direction: row-reverse; }
      .msg-avatar {
        width: 34px; height: 34px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
      }
      .msg-body { max-width: 60%; }
      .msg-bubble {
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
      }
      .msg .msg-bubble {
        background: #16213e;
        border: 1px solid #0f3460;
        border-top-left-radius: 4px;
      }
      .msg.own .msg-bubble {
        background: linear-gradient(135deg, #e94560, #c0392b);
        border: none;
        border-top-right-radius: 4px;
        color: #fff;
      }
      .msg-time { font-size: 10px; color: #4a4a6a; margin-top: 4px; padding: 0 4px; }
      .msg.own .msg-time { text-align: right; }
      .empty-state {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: #3a3a5c; gap: 8px;
      }
      .empty-state .icon { font-size: 40px; }
      .input-bar {
        padding: 14px 20px;
        background: #16213e;
        border-top: 1px solid #0f3460;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }
      .input-bar input {
        flex: 1;
        padding: 12px 16px;
        background: #1a1a2e;
        border: 1px solid #0f3460;
        border-radius: 24px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: border 0.2s;
      }
      .input-bar input:focus { border-color: #e94560; }
      .input-bar input::placeholder { color: #4a4a6a; }
      .send-btn {
        width: 44px; height: 44px;
        background: linear-gradient(135deg, #e94560, #c0392b);
        border: none; border-radius: 50%;
        cursor: pointer; font-size: 18px;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .send-btn:hover { transform: scale(1.08); }
    </style>
  </head>
  <body>
    <header>
      <button class="back-btn" onclick="window.location.href='/dashboard.html'">←</button>
      <div class="avatar" id="friend-avatar"></div>
      <div class="friend-info">
        <h2 id="friend-name"></h2>
        <span>● Online</span>
      </div>
      <div class="ws-status" id="ws-status">Connecting...</div>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="icon">👋</div>
        <p>Say hello to your friend!</p>
      </div>
    </div>

    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="Type a message..." maxlength="500" autocomplete="off" />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const friendId = parseInt(localStorage.getItem("chatFriendId"));
      const friendName = localStorage.getItem("chatFriendName");
      const myUsername = localStorage.getItem("username");

      if (!token || !friendId) window.location.href = "/dashboard.html";

      const colors = ["#e94560","#0f3460","#533483","#2196f3","#ff9800","#009688"];
      function getColor(name) {
        let hash = 0;
        for (let c of name) hash = c.charCodeAt(0) + ((hash << 5) - hash);
        return colors[Math.abs(hash) % colors.length];
      }

      // Set header
      const friendColor = getColor(friendName);
      document.getElementById("friend-name").textContent = friendName;
      const av = document.getElementById("friend-avatar");
      av.textContent = friendName[0].toUpperCase();
      av.style.background = friendColor;

      function getMyId() {
        try { return parseInt(JSON.parse(atob(token.split(".")[1])).sub); }
        catch { return null; }
      }
      const myId = getMyId();

      function formatTime(isoStr) {
        if (!isoStr) return "";
        const d = new Date(isoStr);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function renderMsg(msg) {
        const isOwn = msg.sender_id === myId;
        const name = isOwn ? myUsername : friendName;
        const color = getColor(name);
        const time = msg.created_at ? formatTime(msg.created_at) : new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        return `
          <div class="msg ${isOwn ? "own" : ""}">
            <div class="msg-avatar" style="background:${color}">${name[0].toUpperCase()}</div>
            <div class="msg-body">
              <div class="msg-bubble">${escapeHtml(msg.text)}</div>
              <div class="msg-time">${time}</div>
            </div>
          </div>`;
      }

      function escapeHtml(str) {
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      function scrollBottom() {
        const c = document.getElementById("messages");
        c.scrollTop = c.scrollHeight;
      }

      // Load history
      async function loadHistory() {
        const res = await fetch(`/api/chat/history/${friendId}?token=${token}`);
        if (!res.ok) return;
        const msgs = await res.json();
        if (!msgs.length) return;
        document.getElementById("messages").innerHTML = msgs.map(renderMsg).join("");
        scrollBottom();
      }

      // WebSocket
      const wsProto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${wsProto}://${location.host}/api/chat/ws`);

      ws.onopen = () => {
        document.getElementById("ws-status").textContent = "● Connected";
        document.getElementById("ws-status").style.color = "#22c55e";
        // Send a ping to register connection
        ws.send(JSON.stringify({ token, receiver_id: friendId, text: "" }));
      };

      ws.onclose = () => {
        document.getElementById("ws-status").textContent = "● Disconnected";
        document.getElementById("ws-status").style.color = "#e94560";
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.error) return;
        if (!data.text) return;
        // Only show messages between me and this friend
        if (
          (data.sender_id === myId && data.receiver_id === friendId) ||
          (data.sender_id === friendId && data.receiver_id === myId)
        ) {
          const container = document.getElementById("messages");
          const emptyState = container.querySelector(".empty-state");
          if (emptyState) emptyState.remove();
          container.insertAdjacentHTML("beforeend", renderMsg(data));
          scrollBottom();
        }
      };

      function sendMessage() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ token, receiver_id: friendId, text }));
        input.value = "";
      }

      document.getElementById("msg-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      loadHistory();
    </script>
  </body>
</html>
