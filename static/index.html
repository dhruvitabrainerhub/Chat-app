<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp — Login</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 16px;
        padding: 40px 36px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
      .logo {
        text-align: center;
        font-size: 40px;
        margin-bottom: 8px;
      }
      h1 {
        text-align: center;
        font-size: 22px;
        color: #fff;
        margin-bottom: 4px;
      }
      .subtitle {
        text-align: center;
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 28px;
      }
      .tabs {
        display: flex;
        background: #1a1a2e;
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 24px;
      }
      .tab {
        flex: 1;
        padding: 9px;
        border: none;
        background: none;
        color: #6b7280;
        font-size: 14px;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .tab.active {
        background: linear-gradient(135deg, #e94560, #0f3460);
        color: #fff;
        font-weight: 600;
      }
      .form-group { margin-bottom: 16px; }
      label {
        display: block;
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        background: #1a1a2e;
        border: 1px solid #0f3460;
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: border 0.2s;
      }
      input:focus { border-color: #e94560; }
      .btn {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #e94560, #c0392b);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        transition: opacity 0.2s;
      }
      .btn:hover { opacity: 0.9; }
      .error {
        background: rgba(233,69,96,0.15);
        border: 1px solid #e94560;
        color: #e94560;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .success {
        background: rgba(34,197,94,0.15);
        border: 1px solid #22c55e;
        color: #22c55e;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">💬</div>
      <h1>ChatApp</h1>
      <p class="subtitle">Connect & Chat with Friends</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <div id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter password" />
        </div>
        <button class="btn" onclick="login()">Login</button>
      </div>

      <div id="signup-form" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signup-username" placeholder="Choose username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Choose password" />
        </div>
        <button class="btn" onclick="signup()">Create Account</button>
      </div>
    </div>

    <script>
      if (localStorage.getItem("token")) window.location.href = "/dashboard.html";

      function switchTab(tab) {
        document.getElementById("login-form").style.display = tab === "login" ? "block" : "none";
        document.getElementById("signup-form").style.display = tab === "signup" ? "block" : "none";
        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
        });
        hideMessages();
      }

      function showError(msg) {
        const el = document.getElementById("error");
        el.textContent = msg; el.style.display = "block";
        document.getElementById("success").style.display = "none";
      }

      function showSuccess(msg) {
        const el = document.getElementById("success");
        el.textContent = msg; el.style.display = "block";
        document.getElementById("error").style.display = "none";
      }

      function hideMessages() {
        document.getElementById("error").style.display = "none";
        document.getElementById("success").style.display = "none";
      }

      async function login() {
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;
        if (!username || !password) return showError("Fill all fields");
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.detail || "Login failed");
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("username", username);
        window.location.href = "/dashboard.html";
      }

      async function signup() {
        const username = document.getElementById("signup-username").value.trim();
        const password = document.getElementById("signup-password").value;
        if (!username || !password) return showError("Fill all fields");
        const res = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.detail || "Signup failed");
        showSuccess("Account created! Please login.");
        switchTab("login");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const isLogin = document.getElementById("login-form").style.display !== "none";
          isLogin ? login() : signup();
        }
      });
    </script>
  </body>
</html>
